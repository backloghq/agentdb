name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24, 25]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Coverage
        if: matrix.node-version == 25
        run: npm run test:coverage

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agentdb:ci .

      - name: Verify Docker image starts
        run: |
          docker run -d --name agentdb-test -p 3000:3000 agentdb:ci
          sleep 2
          curl -sf http://localhost:3000/health | grep -q '"ok"'
          docker stop agentdb-test
          docker rm agentdb-test

      - name: Check image size
        run: docker images agentdb:ci --format '{{.Size}}'
